name: Build & Test

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    name: Build & Test (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Cache SwiftPM dependencies
        uses: actions/cache@v6
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build
        run: swift build -v

      - name: Run tests
        run: swift test -v

  build-ios:
    name: Build (iOS)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Cache SwiftPM dependencies
        uses: actions/cache@v6
        with:
          path: .build
          key: ${{ runner.os }}-spm-ios-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-ios-

      - name: Build for iOS (generic device)
        run: xcodebuild -scheme afmize -destination 'generic/platform=iOS' build
