name: Build & Test

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: macos-latest

    strategy:
      matrix:
        include:
          - type: macos
          - type: ios
            deviceName: iPhone 17
            osVersion: "27.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build & Test
        uses: brightdigit/swift-build@v1
        with:
          scheme: afmize
          type: ${{ matrix.type }}
          xcode: /Applications/Xcode_27_beta.app
          deviceName: ${{ matrix.deviceName }}
          osVersion: ${{ matrix.osVersion }}
          download-platform: true
